name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (e.g. v1.2.0). Leave empty to deploy latest.'
        required: false
        default: 'latest'

jobs:
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.tag == 'latest'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/borisnovi/realtor-backend
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.tag == 'latest'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/borisnovi/realtor-frontend
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: APP_VERSION=${{ github.ref_name }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to VPS
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: always() && (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') && (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Copy configs to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/"
          target: /opt/realtor

      - name: Pull and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            TAG=${{ github.event.inputs.tag || 'latest' }}
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/borisnovi/realtor-backend:$TAG
            docker pull ghcr.io/borisnovi/realtor-frontend:$TAG
            sed -i "s|ghcr.io/borisnovi/realtor-backend:.*|ghcr.io/borisnovi/realtor-backend:$TAG|" /opt/realtor/docker-compose.prod.yml
            sed -i "s|ghcr.io/borisnovi/realtor-frontend:.*|ghcr.io/borisnovi/realtor-frontend:$TAG|" /opt/realtor/docker-compose.prod.yml
            docker compose -f /opt/realtor/docker-compose.prod.yml --env-file /opt/realtor/backend/.env.prod up -d --remove-orphans
            docker compose -f /opt/realtor/docker-compose.prod.yml exec nginx rm -rf /var/cache/nginx/spa
            docker compose -f /opt/realtor/docker-compose.prod.yml --env-file /opt/realtor/backend/.env.prod restart nginx
            docker image prune -f

services:
  frontend:
    build: ./frontend
    ports:
      - '4200:80'
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      # Переопределяем только то, что отличается от локалки:
      # в Docker сервисы доступны по имени контейнера, а не localhost
      - DATABASE_HOST=postgres
      - REDIS_HOST=redis
      - USE_REDIS=True
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=${DATABASE_NAME:-2testdb}
      - POSTGRES_USER=${DATABASE_USER:-postgres}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-admin}
    ports:
      - '5432:5432'  # Открыт для локальной разработки (pgAdmin и т.д.)
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine  # Фиксированная версия вместо latest
    restart: always
    ports:
      - '6379:6379'  # Открыт для локальной разработки (redis-cli и т.д.)
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:

services:
  frontend:
    image: ghcr.io/borisnovi/realtor-frontend:latest
    # Нет прямого порта — nginx проксирует
    networks:
      - app-network

  backend:
    image: ghcr.io/borisnovi/realtor-backend:latest
    env_file: ./backend/.env.prod  # Переопределяется через --env-file при запуске
    environment:
      # В Docker сервисы доступны по имени контейнера
      - DATABASE_HOST=postgres
      - REDIS_HOST=redis
    volumes:
      - mediafiles:/app/media  # Общий volume с nginx для раздачи медиафайлов
      - staticfiles:/app/staticfiles  # Общий volume с nginx для статики Django
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    # Нет ports: — база данных недоступна снаружи Docker-сети
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}  # Пароль из .env
    restart: always
    # Нет ports: — Redis недоступен снаружи Docker-сети
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro    # Cloudflare Origin CA сертификат
      - mediafiles:/var/www/media:ro                  # Медиафайлы — раздаёт nginx напрямую
      - staticfiles:/var/www/static:ro                # Статика Django (admin CSS/JS)
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
  mediafiles:
  staticfiles:

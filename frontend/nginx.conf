server {
    listen 80;
    server_name localhost;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Хэшированные чанки Angular — кэшируем навсегда (имя меняется при каждом билде)
    location ~* \.(js|css)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Шрифты, иконки, картинки
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Переводы — кэш на 1 час
    location ~* \.json$ {
        root /usr/share/nginx/html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # HTML — не кэшируем
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.csr.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

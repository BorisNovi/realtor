<p-select
  [(ngModel)]="contact"
  [options]="items()"
  optionLabel="label"
  [virtualScroll]="true"
  [virtualScrollItemSize]="38"
  [virtualScrollOptions]="options"
  [loading]="loading()"
  (onShow)="onShow()"
  [placeholder]="placeholder()"
  [filter]="withSearch()"
  [emptyMessage]="emptyMessage()"
  [showClear]="true"
  class="w-full"
>
  <ng-template #filter>
    <p-inputgroup>
      <p-inputgroup-addon>
        <i class="pi pi-search"></i>
      </p-inputgroup-addon>
      <input pInputText [(ngModel)]="search" />
    </p-inputgroup>
  </ng-template>
</p-select>

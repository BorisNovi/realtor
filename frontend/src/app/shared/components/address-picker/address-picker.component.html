<div class="relative w-full flex items-center flex-col overflow-hidden rounded-md">
  <p-inputgroup class="absolute z-10 top-2 !w-[90%]">
    <input pInputText placeholder="City, Street, House ..." [ngModel]="address()" (ngModelChange)="address.set($event)" />
    <p-inputgroup-addon>
      <p-button icon="pi pi-search" severity="secondary" (click)="search()" [disabled]="!address()" />
    </p-inputgroup-addon>
  </p-inputgroup>

  <p-button class="absolute z-10 right-2 bottom-20" icon="pi pi-map-marker" [outlined]="true" (click)="updateLocation(true)" />

  <app-map class="flex w-full h-[28rem]" [center]="mapCenter()" [zoom]="10">
    <app-map-marker
      [position]="markerPosition()!"
      [draggable]="true"
      (dragEnd)="onMarkerDrag($event)"
      (markerClick)="(null)"
    ></app-map-marker>
  </app-map>
</div>

<div [formGroup]="form" class="space-y-8">
  @for (fieldset of fieldsetConfig(); track fieldset.formGroupName || fieldset.label) {
    <fieldset>
      <legend class="block text-sm font-medium text-gray-700 mb-1">{{ fieldset.label | translate }}</legend>
      <div [formGroupName]="fieldset.formGroupName || null" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-3 gap-4">
        @for (field of fieldset.fields; track field.formControlName) {
          <div class="flex items-center">
            <p-checkbox [inputId]="field.formControlName" [formControlName]="field.formControlName" [binary]="true" />
            <label [for]="field.formControlName" class="ml-2">{{ field.label | translate }}</label>
          </div>
        }
      </div>
    </fieldset>
  }
</div>

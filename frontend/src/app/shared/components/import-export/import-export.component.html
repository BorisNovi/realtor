<div class="flex flex-col gap-4">
  @for (section of sections(); track section.entityId; let last = $last) {
    <div class="flex flex-col gap-2">
      <div class="font-semibold">{{ section.labelKey | translate }}</div>

      <div class="flex gap-2 flex-wrap">
        <p-button
          icon="pi pi-upload"
          variant="outlined"
          size="small"
          [label]="'IMPORT_EXPORT.IMPORT' | translate: { type: section.formats }"
          [disabled]="getState(section.entityId).status === 'uploading'"
          (click)="triggerImport(section)"
        />
        <p-button
          icon="pi pi-download"
          variant="outlined"
          size="small"
          [label]="'IMPORT_EXPORT.EXPORT' | translate: { type: section?.exportTypeSuffix }"
          (click)="exportFile(section)"
        />
      </div>

      <rx-file-upload-progress
        [progress]="getState(section.entityId).progress"
        [status]="getState(section.entityId).status"
        [label]="'IMPORT_EXPORT.UPLOADING' | translate"
      />
    </div>

    @if (!last) {
      <p-divider class="my-0" />
    }
  }
</div>

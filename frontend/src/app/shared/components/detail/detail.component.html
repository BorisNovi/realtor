@let pObject = propertyObject();
<div class="flex flex-row gap-8 w-full">
  <div class="card w-[50%]">
    <p-galleria
      [value]="images"
      [responsiveOptions]="galleriaResponsiveOptions"
      [containerStyle]="{ 'max-width': '640px' }"
      [numVisible]="5"
    >
      <ng-template #item let-item>
        <img [src]="item.image" style="width: 100%" alt="image" />
      </ng-template>
      <ng-template #thumbnail let-item>
        <img [src]="item.thumbnail" alt="thumbnail" />
      </ng-template>
    </p-galleria>
  </div>
  <div class="w-[60%]">
    <h2 class="font-semibold text-xxs mb-4">
      {{ pObject?.propertyType || '' }} {{ pObject?.area || 0 }} m² - {{ pObject?.price?.value || 0 }}
      {{ pObject?.price?.currency || '$' }}
    </h2>
    <div class="card">
      <h5>Main info h</h5>
      <div>main info</div>
    </div>
    <div class="card">
      <div>sub info</div>
    </div>
  </div>
</div>

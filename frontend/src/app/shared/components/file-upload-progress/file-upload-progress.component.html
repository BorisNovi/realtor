@if (status() !== 'idle') {
  <div class="flex flex-col gap-1.5">
    <div class="flex items-center justify-between text-sm">
      <span class="text-surface-500">{{ label() }}</span>

      @switch (status()) {
        @case ('uploading') {
          <span class="text-primary font-medium">{{ progress() }}%</span>
        }
        @case ('success') {
          <span class="text-green-500 flex items-center gap-1">
            <i class="pi pi-check-circle"></i>
            {{ 'IMPORT_EXPORT.UPLOAD_SUCCESS' | translate }}
          </span>
        }
        @case ('error') {
          <span class="text-red-500 flex items-center gap-1">
            <i class="pi pi-times-circle"></i>
            {{ 'IMPORT_EXPORT.UPLOAD_ERROR' | translate }}
          </span>
        }
      }
    </div>

    @if (status() === 'uploading') {
      <p-progressbar [value]="progress()" [showValue]="false" [style]="{ height: '4px' }" />
    }
  </div>
}

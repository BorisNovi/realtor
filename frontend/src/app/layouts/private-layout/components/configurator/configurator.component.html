<div class="fixed flex gap-4 top-8 right-8 z-10">
  <p-button
    type="button"
    (onClick)="toggleDarkMode()"
    [rounded]="true"
    [icon]="isDarkTheme() ? 'pi pi-moon' : 'pi pi-sun'"
    severity="secondary"
  />
  <p-button
    type="button"
    (onClick)="toggleLanguage()"
    [rounded]="true"
    icon="pi pi-globe"
    [pTooltip]="currentLanguage().label"
    tooltipPosition="left"
  />
</div>

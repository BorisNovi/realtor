<p-inputgroup>
  <input pInputText placeholder="Address" [ngModel]="address()" (ngModelChange)="address.set($event)" />
  <p-inputgroup-addon>
    <p-button icon="pi pi-search" severity="secondary" variant="text" (click)="onGeocode()" />
  </p-inputgroup-addon>
</p-inputgroup>

<rx-map class="flex w-full h-[40rem]" [center]="c()" [zoom]="10">
  <rx-map-marker [position]="[41.649008, 41.641028]" (dragEnd)="on3($event)" draggable></rx-map-marker>
  <rx-map-marker [position]="[41.642414, 41.635242]" (markerClick)="on3($event)"></rx-map-marker>

  @if (foundMarker() !== null) {
    <rx-map-marker [position]="foundMarker() || [0, 0]" color="red"></rx-map-marker>
  }
</rx-map>
<div>
  <button (click)="on1()">pan batumi</button>
  <button (click)="on2()">set center</button>
</div>

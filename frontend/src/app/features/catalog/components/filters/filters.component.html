<div class="">
  <form [formGroup]="form" class="grid grid-cols-1 gap-4">
    <!-- Date Added -->
    <p-divider align="left" type="solid">
      <b>{{ 'CATALOG.FILTERS.DATE.LABEL' | translate }}</b>
    </p-divider>
    <ng-container formGroupName="dateAdded">
      <div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Date From -->
          <div>
            <label for="dateFrom" class="block text-sm font-medium text-gray-700 mb-1">{{
              'CATALOG.FILTERS.DATE.FROM' | translate
            }}</label>
            <p-datepicker
              id="dateFrom"
              formControlName="from"
              [readonlyInput]="true"
              dateFormat="dd mm yy"
              [placeholder]="'CATALOG.FILTERS.DATE.PLACEHOLDER' | translate"
              class="w-full"
            />
          </div>
          <!-- Date To -->
          <div>
            <label for="dateTo" class="block text-sm font-medium text-gray-700 mb-1">{{
              'CATALOG.FILTERS.DATE.TO' | translate
            }}</label>
            <p-datepicker
              id="dateTo"
              formControlName="to"
              [readonlyInput]="true"
              dateFormat="dd mm yy"
              [placeholder]="'CATALOG.FILTERS.DATE.PLACEHOLDER' | translate"
              class="w-full"
            />
          </div>
        </div>
      </div>
    </ng-container>

    <!-- Property -->
    <p-divider align="left" type="solid">
      <b>{{ 'CATALOG.FILTERS.PROPERTIES' | translate }}</b>
    </p-divider>

    <!-- Status (Select with Severity) -->
    <div>
      <label for="status" class="block text-sm font-medium text-gray-700 mb-1">{{ 'FORM.LABELS.STATUS' | translate }}</label>
      <p-select
        id="status"
        formControlName="status"
        [options]="statuses"
        optionLabel="label"
        optionValue="value"
        [placeholder]="'FORM.PLACEHOLDERS.STATUS' | translate"
        [showClear]="true"
        class="w-full"
        [ngStyle]="{
          'background-color': getStatusBackground(form.controls['status'].value),
        }"
      >
        <ng-template pTemplate="item" let-item>
          <div class="flex items-center">
            <p-tag [value]="item.label" [severity]="getSeverity(item.value)" />
          </div>
        </ng-template>
      </p-select>
    </div>

    <!-- Property Type (MultiSelect) -->
    <div>
      <label for="propertyType" class="block text-sm font-medium text-gray-700 mb-1">{{
        'FORM.LABELS.PROPERTY_TYPE' | translate
      }}</label>
      <p-multiselect
        id="propertyType"
        formControlName="propertyType"
        [options]="propertyTypes"
        display="chip"
        [filter]="false"
        [showToggleAll]="false"
        optionLabel="label"
        optionValue="value"
        [placeholder]="'FORM.PLACEHOLDERS.PROPERTY_TYPE' | translate"
        class="w-full"
      />
    </div>

    <!-- Zoning Type (MultiSelect) -->
    <div>
      <label for="zoningType" class="block text-sm font-medium text-gray-700 mb-1">{{
        'FORM.LABELS.ZONING' | translate
      }}</label>
      <p-multiselect
        id="zoningType"
        formControlName="zoningType"
        [options]="zoningTypes"
        display="chip"
        [filter]="false"
        [showToggleAll]="false"
        optionLabel="label"
        optionValue="value"
        [placeholder]="'FORM.PLACEHOLDERS.ZONING' | translate"
        class="w-full"
      />
    </div>

    <!-- Area -->
    <p-divider align="left" type="solid">
      <b>{{ 'CATALOG.FILTERS.AREA.LABEL' | translate }}</b>
    </p-divider>
    <ng-container formGroupName="area">
      <div>
        <div class="grid grid-cols-1 gap-4">
          <!-- Area Min -->
          <div>
            <label for="areaMin" class="block text-sm font-medium text-gray-700 mb-1"
              >{{ 'CATALOG.FILTERS.AREA.MIN' | translate }} m²</label
            >
            <p-inputnumber
              id="areaMin"
              [showButtons]="true"
              [step]="10"
              [min]="0"
              [max]="100_000_000_000"
              formControlName="min"
              [placeholder]="'CATALOG.FILTERS.AREA.MIN' | translate"
              class="w-full"
            />
          </div>
          <!-- Area Max -->
          <div>
            <label for="areaMax" class="block text-sm font-medium text-gray-700 mb-1"
              >{{ 'CATALOG.FILTERS.AREA.MAX' | translate }} m²</label
            >
            <p-inputnumber
              id="areaMax"
              [showButtons]="true"
              [step]="10"
              [min]="0"
              [max]="100_000_000_000"
              formControlName="max"
              [placeholder]="'CATALOG.FILTERS.AREA.MAX' | translate"
              class="w-full"
            />
          </div>
        </div>
      </div>
    </ng-container>

    <!-- Price -->
    <p-divider align="left" type="solid">
      <b>{{ 'CATALOG.FILTERS.PRICE.LABEL' | translate }}</b>
    </p-divider>
    <ng-container formGroupName="price">
      <div>
        <div class="grid grid-cols-1 gap-4">
          <!-- Currency -->
          <div>
            <label for="currency" class="block text-sm font-medium text-gray-700 mb-1">{{
              'FORM.LABELS.CURRENCY' | translate
            }}</label>
            <p-select
              id="currency"
              [options]="currencies"
              [filter]="true"
              filterBy="value"
              optionLabel="label"
              optionValue="value"
              formControlName="currency"
              [placeholder]="'FORM.PLACEHOLDERS.CURRENCY' | translate"
              class="w-full"
            />
          </div>
          <!-- Price Min -->
          <div>
            <label for="priceMin" class="block text-sm font-medium text-gray-700 mb-1">{{
              'CATALOG.FILTERS.PRICE.MIN' | translate
            }}</label>
            <p-inputnumber
              inputId="priceMin"
              [showButtons]="true"
              [step]="10"
              [min]="0"
              [max]="100_000_000_000"
              mode="currency"
              [currency]="form.controls['price'].value.currency || 'EUR'"
              formControlName="min"
              [placeholder]="'CATALOG.FILTERS.PRICE.MIN' | translate"
              locale="de-DE"
              class="w-full"
            />
          </div>
          <!-- Price Max -->
          <div>
            <label for="priceMax" class="block text-sm font-medium text-gray-700 mb-1">{{
              'CATALOG.FILTERS.PRICE.MAX' | translate
            }}</label>
            <p-inputnumber
              inputId="priceMax"
              [showButtons]="true"
              [step]="10"
              [min]="0"
              [max]="100_000_000_000"
              mode="currency"
              [currency]="form.controls['price'].value.currency || 'EUR'"
              formControlName="max"
              [placeholder]="'CATALOG.FILTERS.PRICE.MAX' | translate"
              locale="de-DE"
              class="w-full"
            />
          </div>
        </div>
      </div>
    </ng-container>

    <!-- Buttons -->
    <div class="mt-8 sticky bottom-0 z-10">
      <p-button
        [label]="'CATALOG.FILTERS.RESET' | translate"
        type="button"
        (onClick)="resetFilters()"
        [fluid]="true"
        [disabled]="form.untouched"
      />
    </div>
  </form>
</div>

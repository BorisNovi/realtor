<div class="">
  <form [formGroup]="form" class="grid grid-cols-1 gap-4">
    <!-- Date Added -->
    <p-divider align="left" type="solid">
      <b>Date</b>
    </p-divider>
    <ng-container formGroupName="dateAdded">
      <div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Date From -->
          <div>
            <label for="dateFrom" class="block text-sm font-medium text-gray-700 mb-1">Date from</label>
            <p-datepicker
              id="dateFrom"
              formControlName="from"
              [readonlyInput]="true"
              dateFormat="dd mm yy"
              placeholder="not selected"
              class="w-full"
            />
          </div>
          <!-- Date To -->
          <div>
            <label for="dateTo" class="block text-sm font-medium text-gray-700 mb-1">Date to</label>
            <p-datepicker
              id="dateTo"
              formControlName="to"
              [readonlyInput]="true"
              dateFormat="dd mm yy"
              placeholder="not selected"
              class="w-full"
            />
          </div>
        </div>
      </div>
    </ng-container>

    <!-- Property -->
    <p-divider align="left" type="solid">
      <b>Property</b>
    </p-divider>

    <!-- Status (Select with Severity) -->
    <div>
      <label for="status" class="block text-sm font-medium text-gray-700 mb-1">Status</label>
      <p-select
        id="status"
        formControlName="status"
        [options]="statuses"
        optionLabel="label"
        optionValue="value"
        placeholder="Select Status"
        [showClear]="true"
        class="w-full"
        [ngStyle]="{
          'background-color': getStatusBackground(form.controls['status'].value),
        }"
      >
        <ng-template pTemplate="item" let-item>
          <div class="flex items-center">
            <p-tag [value]="item.label" [severity]="getSeverity(item.value)" />
          </div>
        </ng-template>
      </p-select>
    </div>

    <!-- Property Type (MultiSelect) -->
    <div>
      <label for="propertyType" class="block text-sm font-medium text-gray-700 mb-1">Property Type</label>
      <p-multiselect
        id="propertyType"
        formControlName="propertyType"
        [options]="propertyTypes"
        display="chip"
        [filter]="false"
        [showToggleAll]="false"
        optionLabel="label"
        optionValue="value"
        placeholder="Select Property Type"
        class="w-full"
      />
    </div>

    <!-- Zoning Type (MultiSelect) -->
    <div>
      <label for="zoningType" class="block text-sm font-medium text-gray-700 mb-1">Zoning</label>
      <p-multiselect
        id="zoningType"
        formControlName="zoningType"
        [options]="zoningTypes"
        display="chip"
        [filter]="false"
        [showToggleAll]="false"
        optionLabel="label"
        optionValue="value"
        placeholder="Select Zoning Type"
        class="w-full"
      />
    </div>

    <!-- Area -->
    <p-divider align="left" type="solid">
      <b>Area</b>
    </p-divider>
    <ng-container formGroupName="area">
      <div>
        <div class="grid grid-cols-1 gap-4">
          <!-- Area Min -->
          <div>
            <label for="areaMin" class="block text-sm font-medium text-gray-700 mb-1">Area min</label>
            <p-inputnumber
              id="areaMin"
              suffix=" m²"
              [showButtons]="true"
              [step]="10"
              [min]="0"
              formControlName="min"
              placeholder="Area min"
              class="w-full"
            />
          </div>
          <!-- Area Max -->
          <div>
            <label for="areaMax" class="block text-sm font-medium text-gray-700 mb-1">Area max</label>
            <p-inputnumber
              id="areaMax"
              suffix=" m²"
              [showButtons]="true"
              [step]="10"
              [min]="0"
              formControlName="max"
              placeholder="Area max"
              class="w-full"
            />
          </div>
        </div>
      </div>
    </ng-container>

    <!-- Price -->
    <p-divider align="left" type="solid">
      <b>Price</b>
    </p-divider>
    <ng-container formGroupName="price">
      <div>
        <div class="grid grid-cols-1 gap-4">
          <!-- Currency -->
          <div>
            <label for="currency" class="block text-sm font-medium text-gray-700 mb-1">Currency</label>
            <p-select
              id="currency"
              [options]="currencies"
              optionLabel="label"
              optionValue="value"
              formControlName="currency"
              placeholder="e.g., USD"
              class="w-full"
            />
          </div>
          <!-- Price Min -->
          <div>
            <label for="priceMin" class="block text-sm font-medium text-gray-700 mb-1">Price min</label>
            <p-inputnumber
              id="priceMin"
              [suffix]="' ' + (getCurrencySymbol(form.controls['price'].value.currency) || '')"
              [showButtons]="true"
              [step]="10"
              [min]="0"
              formControlName="min"
              placeholder="Price min"
              class="w-full"
            />
          </div>
          <!-- Price Max -->
          <div>
            <label for="priceMax" class="block text-sm font-medium text-gray-700 mb-1">Price max</label>
            <p-inputnumber
              id="priceMax"
              [suffix]="' ' + (getCurrencySymbol(form.controls['price'].value.currency) || '')"
              [showButtons]="true"
              [step]="10"
              [min]="0"
              formControlName="max"
              placeholder="Price max"
              class="w-full"
            />
          </div>
        </div>
      </div>
    </ng-container>

    <!-- Buttons -->
    <div class="mt-8 sticky bottom-0 z-10">
      <p-button label="Reset" type="button" (onClick)="resetFilters()" [fluid]="true" [disabled]="form.untouched" />
    </div>
  </form>
</div>

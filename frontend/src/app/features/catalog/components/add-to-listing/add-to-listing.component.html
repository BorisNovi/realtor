<rx-select
  [fetcher]="listingsFetchMethod"
  [itemTpl]="itemTemplate"
  [mapToSelect]="lisitingsMapToSelect"
  [disabledIds]="listingsAlreadyHasObject()"
  [disableFn]="disableListingWhithCurrentObject"
  [open]="true"
  (valueClick)="onListingClick($event)"
></rx-select>

<ng-template #itemTemplate let-item>
  <div
    class="flex flex-1 items-center h-full"
    [pTooltip]="disableListingWhithCurrentObject(item) ? ('LISTINGS.ACTIONS.ALREADY_ADDED' | translate) : undefined"
  >
    {{ item.label }}
  </div>
</ng-template>

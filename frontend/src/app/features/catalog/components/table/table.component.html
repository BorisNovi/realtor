<div class="card">
  <p-table
    #pTable
    [scrollable]="true"
    [scrollHeight]="'65dvh'"
    [value]="tableData || []"
    [paginator]="true"
    [rows]="20"
    [rowsPerPageOptions]="[10, 20, 50]"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
    (onPage)="pageChange($event)"
    [(selection)]="selectedItems"
    [tableStyle]="{ 'min-width': '40rem' }"
  >
    <!-- <ng-template #caption>
          <div class="flex items-center justify-between">
              <span class="text-xl">Catalog</span>
          </div>
      </ng-template> -->
    <ng-template #header>
      <tr>
        <th style="width: 4rem"><p-tableHeaderCheckbox /></th>
        <th>Photo</th>
        <th>Type</th>
        <th>Address</th>
        <th>Price</th>
        <th>Area</th>
        <th>Rooms</th>
        <th>Floor</th>
        <th style="min-width: 8rem">Date</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </ng-template>
    <ng-template #body let-item>
      <tr>
        <td>
          <p-tableCheckbox [value]="item" />
        </td>
        <td>
          <img [src]="item.photos[0]" [alt]="item.name" class="w-24 rounded" />
        </td>
        <td>{{ item.propertyType }}</td>
        <td>{{ item.address }}</td>
        <td>{{ item.price.value | number }} {{ item.price.currency }}</td>
        <td>{{ item.area }} m^2</td>
        <td>{{ item.rooms }}</td>
        <td>{{ item.floor.current }} / {{ item.floor.full }}</td>
        <td>{{ item.dateAdded }}</td>
        <td>
          <p-tag [value]="item.status" [severity]="getSeverity(item.status)" />
        </td>
        <td>
          <p-button icon="pi pi-ellipsis-v" (click)="openActions(item)" severity="secondary" text rounded />
        </td>
      </tr>
    </ng-template>
    <ng-template #footer>
      <tr>
        <td colspan="5" class="text-right font-bold p-3 pb-0">Totals</td>
        <td colspan="2" class="font-bold p-3 pb-0">test</td>
        <td class="font-bold p-3 pb-0">test</td>
        <td colspan="3" class="font-bold p-3 pb-0">test</td>
      </tr>
    </ng-template>
  </p-table>
</div>

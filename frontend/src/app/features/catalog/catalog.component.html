  [visible]="filtersService.isOpen()"
  (visibleChange)="$event || filtersService.closeFilters()"
  position="right"
>
  <rx-filters (filtersChange)="onFiltersChange($event)" (filtersCount)="filtersService.setFiltersCount($event)"></rx-filters>
</p-drawer>

<p-drawer [header]="'CATALOG.FILTERS.LABEL' | translate" [(visible)]="isFiltersOpen" position="right">
  <rx-filters (filtersChange)="onFiltersChange($event)" (filtersCount)="filtersCount.set($event)"></rx-filters>
</p-drawer>
<rx-table
  [filtersCount]="filtersCount()"
  (filtersOpen)="isFiltersOpen = true"
  (paginationChange)="onPaginationChange($event)"
  (sortChange)="onSortChange($event)"
></rx-table>

<div class="p-4">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <!-- Contact -->
    <ng-container formGroupName="contact">
      <!-- Name -->
      <rx-input-wrapper
        [control]="form.get('contact')?.get('name')!"
        [label]="'FORM.LABELS.CONTACT_NAME' | translate"
        id="contactName"
      >
        <input
          id="contactName"
          pInputText
          type="text"
          formControlName="name"
          [placeholder]="'FORM.PLACEHOLDERS.CONTACT_NAME' | translate"
          class="w-full"
        />
      </rx-input-wrapper>

      <!-- Phone -->
      <rx-input-wrapper
        [control]="form.get('contact')?.get('phone')!"
        [label]="'FORM.LABELS.CONTACT_PHONE' | translate"
        id="contactPhone"
      >
        <p-inputgroup>
          <p-inputgroup-addon>
            <i class="pi pi-phone"></i>
          </p-inputgroup-addon>
          <input
            id="contactPhone"
            pInputText
            type="text"
            formControlName="phone"
            [placeholder]="'FORM.PLACEHOLDERS.CONTACT_PHONE' | translate"
            rxWorldPhoneMasks
            (valid)="validPhone($event)"
          />
        </p-inputgroup>
      </rx-input-wrapper>
    </ng-container>

    <div class="md:col-span-2" @slide>
      <label for="comment" class="block text-sm font-medium text-gray-700 mb-1">{{ 'FORM.LABELS.COMMENT' | translate }}</label>
      <textarea id="comment" formControlName="comment" [fluid]="true" rows="5" pTextarea [autoResize]="true"></textarea>
    </div>

    <!-- Buttons -->
    <div class="md:col-span-2 flex justify-end gap-2 mt-6 sticky bottom-0">
      <p-button
        [label]="'FORM.BUTTONS.CANCEL' | translate"
        type="button"
        (click)="onCancel()"
        class="backdrop-blur-[2px]"
        outlined
      />
      <p-button
        [label]="'FORM.BUTTONS.SAVE' | translate"
        type="submit"
        class="p-button-primary backdrop-blur-[2px]"
        [disabled]="form.invalid"
      />
    </div>
  </form>
</div>

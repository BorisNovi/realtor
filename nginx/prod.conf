# ============================================================
# Замени YOUR_DOMAIN на свой домен (например, realtor.ru)
# Staging: staging.realtor.ru
# Production: realtor.ru, www.realtor.ru
# ============================================================

# HTTP → HTTPS редирект
server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Нужно для certbot (получение/обновление Let's Encrypt сертификата)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Современные SSL-настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Медиафайлы Django (загрузки пользователей) — из volume напрямую
    # /media/ НЕ используем — Angular кладёт туда шрифты и иконки из сборки
    location /uploads/ {
        alias /var/www/media/;
    }

    # Статика Django (CSS/JS для /admin) — из volume
    location /static/ {
        alias /var/www/static/;
    }

    # Django API и админка
    location ~ ^/(api|admin) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Говорим Django, что исходный запрос был по HTTPS
        # (нужно для SECURE_PROXY_SSL_HEADER в settings.py)
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Всё остальное — Angular SPA (frontend)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# ============================================================
# Production: urbancrm.app, www.urbancrm.app
# Staging:    staging.urbancrm.app
#
# SSL: Cloudflare Origin CA (не Let's Encrypt)
# Сертификат: /etc/ssl/cloudflare/urbancrm.crt
# Ключ:       /etc/ssl/cloudflare/urbancrm.key
# ============================================================

# HTTP → HTTPS редирект
server {
    listen 80;
    server_name urbancrm.app www.urbancrm.app;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name urbancrm.app www.urbancrm.app;

    ssl_certificate     /etc/ssl/cloudflare/urbancrm.crt;
    ssl_certificate_key /etc/ssl/cloudflare/urbancrm.key;

    # Современные SSL-настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Лимит размера загружаемых файлов
    client_max_body_size 100m;

    # Медиафайлы Django (загрузки пользователей) — из volume напрямую
    # /media/ НЕ используем — Angular кладёт туда шрифты и иконки из сборки
    location /uploads/ {
        alias /var/www/media/;
    }

    # Статика Django (CSS/JS для /admin) — из volume
    location /static/ {
        alias /var/www/static/;
    }

    # Django API и админка
    location ~ ^/(api|admin) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Говорим Django, что исходный запрос был по HTTPS
        # (нужно для SECURE_PROXY_SSL_HEADER в settings.py)
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Всё остальное — Angular SPA (frontend)
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

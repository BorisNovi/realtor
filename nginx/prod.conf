# ============================================================
# Production: urbancrm.app, www.urbancrm.app
# Staging:    staging.urbancrm.app
#
# SSL: Cloudflare Origin CA (не Let's Encrypt)
# Сертификат: /etc/ssl/cloudflare/urbancrm.crt
# Ключ:       /etc/ssl/cloudflare/urbancrm.key
# ============================================================

upstream frontend_upstream {
    server frontend:80;
    keepalive 32;
}

upstream backend_upstream {
    server backend:8000;
    keepalive 16;
}

proxy_cache_path /var/cache/nginx/spa
    levels=1:2
    keys_zone=spa:20m
    max_size=500m
    inactive=7d
    use_temp_path=off;

# HTTP → HTTPS редирект
server {
    listen 80;
    server_name urbancrm.app www.urbancrm.app;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name urbancrm.app www.urbancrm.app;

    ssl_certificate     /etc/ssl/cloudflare/urbancrm.crt;
    ssl_certificate_key /etc/ssl/cloudflare/urbancrm.key;

    # Современные SSL-настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Лимит размера загружаемых файлов
    client_max_body_size 100m;

    # Медиафайлы Django (загрузки пользователей) — из volume напрямую
    # /media/ НЕ используем — Angular кладёт туда шрифты и иконки из сборки
    location /uploads/ {
        alias /var/www/media/;
    }

    # Статика Django (CSS/JS для /admin) — из volume
    location /static/ {
        alias /var/www/static/;
    }

    # Django API и админка
    location ~ ^/(api|admin) {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Говорим Django, что исходный запрос был по HTTPS
        # (нужно для SECURE_PROXY_SSL_HEADER в settings.py)
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Всё остальное — Angular SPA (frontend)
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_cache spa;
        proxy_cache_valid 200 7d;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;
    }
}
